<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgEnergy" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fffbeb" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="bgStress" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fef2f2" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fecaca" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="bgFulfill" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a7f3d0" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="bgLow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
      <feOffset dx="0" dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="560" fill="#fafafa"/>

  <!-- title block -->
  <text x="480" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a" letter-spacing="-0.3">Three axes, one display</text>
  <text x="480" y="64" text-anchor="middle" font-size="13" fill="#64748b">Energy, stress, and fulfillment live in different quadrants of the affect plane &#8212; a single scalar cannot preserve this geometry.</text>

  <!-- ============================= LEFT: CIRCUMPLEX ============================= -->
  <g transform="translate(250,320)">

    <!-- quadrant fills -->
    <path d="M 0 0 L 180 0 A 180 180 0 0 1 0 -180 Z" fill="url(#bgEnergy)"/>
    <path d="M 0 0 L 0 -180 A 180 180 0 0 1 -180 0 Z" fill="url(#bgStress)"/>
    <path d="M 0 0 L -180 0 A 180 180 0 0 1 0 180 Z" fill="url(#bgLow)"/>
    <path d="M 0 0 L 0 180 A 180 180 0 0 1 180 0 Z" fill="url(#bgFulfill)"/>

    <!-- outer ring -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- axes -->
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#334155" stroke-width="1.2"/>
    <line x1="0" y1="200" x2="0" y2="-200" stroke="#334155" stroke-width="1.2"/>
    <polygon points="200,0 192,-4.5 192,4.5" fill="#334155"/>
    <polygon points="-200,0 -192,-4.5 -192,4.5" fill="#334155"/>
    <polygon points="0,-200 -4.5,-192 4.5,-192" fill="#334155"/>
    <polygon points="0,200 -4.5,192 4.5,192" fill="#334155"/>

    <!-- axis labels -->
    <text x="210" y="5" font-size="13" font-weight="700" fill="#0f172a">pleasant</text>
    <text x="-210" y="5" text-anchor="end" font-size="13" font-weight="700" fill="#0f172a">unpleasant</text>
    <text x="0" y="-212" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">activated</text>
    <text x="0" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">deactivated</text>
    <text x="210" y="20" font-size="10" fill="#94a3b8" font-style="italic">valence</text>
    <text x="8" y="-212" font-size="10" fill="#94a3b8" font-style="italic">arousal</text>

    <!-- quadrant corner labels (subtle) -->
    <text x="128" y="-155" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">high-arousal positive</text>
    <text x="-128" y="-155" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">high-arousal negative</text>
    <text x="-128" y="168" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">low-arousal negative</text>
    <text x="128" y="168" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">low-arousal positive</text>

    <!-- E marker + leader -->
    <line x1="127" y1="-90" x2="175" y2="-140" stroke="#b45309" stroke-width="1.2" stroke-dasharray="2,2"/>
    <g filter="url(#dropShadow)">
      <circle cx="127" cy="-90" r="26" fill="#f59e0b" stroke="#92400e" stroke-width="2.5"/>
      <text x="127" y="-83" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">E</text>
    </g>

    <!-- S marker + leader -->
    <line x1="-127" y1="-90" x2="-175" y2="-140" stroke="#991b1b" stroke-width="1.2" stroke-dasharray="2,2"/>
    <g filter="url(#dropShadow)">
      <circle cx="-127" cy="-90" r="26" fill="#dc2626" stroke="#7f1d1d" stroke-width="2.5"/>
      <text x="-127" y="-83" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">S</text>
    </g>

    <!-- F marker + leader -->
    <line x1="127" y1="90" x2="175" y2="140" stroke="#065f46" stroke-width="1.2" stroke-dasharray="2,2"/>
    <g filter="url(#dropShadow)">
      <circle cx="127" cy="90" r="26" fill="#10b981" stroke="#065f46" stroke-width="2.5"/>
      <text x="127" y="97" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">F</text>
    </g>

    <!-- fatigue reference -->
    <circle cx="-127" cy="90" r="8" fill="#94a3b8" stroke="#475569" stroke-width="1"/>
    <text x="-127" y="115" text-anchor="middle" font-size="10" fill="#475569">fatigue</text>

    <!-- origin -->
    <circle cx="0" cy="0" r="3" fill="#334155"/>
  </g>

  <!-- ============================= RIGHT: 3 DISPLAY CHANNELS ============================= -->
  <g transform="translate(550,120)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#0f172a">One object, three channels</text>
    <text x="0" y="18" font-size="11" fill="#64748b">Each psychological axis drives a distinct output.</text>

    <!-- E row -->
    <g transform="translate(0,45)">
      <rect x="0" y="0" width="380" height="78" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
      <!-- letter -->
      <circle cx="32" cy="39" r="20" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
      <text x="32" y="46" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">E</text>
      <!-- text -->
      <text x="65" y="28" font-size="14" font-weight="700" fill="#92400e">Energy &#8594; fill level</text>
      <text x="65" y="46" font-size="11" fill="#78350f">how full the battery looks &#8212; what most</text>
      <text x="65" y="60" font-size="11" fill="#78350f">people mean by &#8220;running low.&#8221;</text>
      <!-- mini battery demo -->
      <g transform="translate(300,18)">
        <rect x="0" y="0" width="40" height="42" rx="3" fill="none" stroke="#334155" stroke-width="1.8"/>
        <rect x="13" y="-4" width="14" height="4" rx="1" fill="#334155"/>
        <rect x="4" y="14" width="32" height="24" rx="2" fill="#f59e0b"/>
      </g>
    </g>

    <!-- S row -->
    <g transform="translate(0,138)">
      <rect x="0" y="0" width="380" height="78" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
      <circle cx="32" cy="39" r="20" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
      <text x="32" y="46" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">S</text>
      <text x="65" y="28" font-size="14" font-weight="700" fill="#991b1b">Stress &#8594; hue &amp; pulse</text>
      <text x="65" y="46" font-size="11" fill="#7f1d1d">amber shifts toward red as allostatic</text>
      <text x="65" y="60" font-size="11" fill="#7f1d1d">load accumulates; slow pulse above 60.</text>
      <g transform="translate(300,18)">
        <rect x="0" y="0" width="40" height="42" rx="3" fill="none" stroke="#334155" stroke-width="1.8"/>
        <rect x="13" y="-4" width="14" height="4" rx="1" fill="#334155"/>
        <rect x="4" y="14" width="32" height="24" rx="2" fill="#dc2626"/>
        <circle cx="20" cy="26" r="18" fill="none" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="2,2" opacity="0.7"/>
      </g>
    </g>

    <!-- F row -->
    <g transform="translate(0,231)">
      <rect x="0" y="0" width="380" height="78" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
      <circle cx="32" cy="39" r="20" fill="#10b981" stroke="#065f46" stroke-width="2"/>
      <text x="32" y="46" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">F</text>
      <text x="65" y="28" font-size="14" font-weight="700" fill="#065f46">Fulfillment &#8594; accent glow</text>
      <text x="65" y="46" font-size="11" fill="#064e3b">a secondary LED that lights after meaningful</text>
      <text x="65" y="60" font-size="11" fill="#064e3b">progress &#8212; independent of E and S.</text>
      <g transform="translate(300,18)">
        <rect x="0" y="0" width="40" height="42" rx="3" fill="none" stroke="#334155" stroke-width="1.8"/>
        <rect x="13" y="-4" width="14" height="4" rx="1" fill="#334155"/>
        <rect x="4" y="28" width="32" height="10" rx="2" fill="#94a3b8"/>
        <circle cx="20" cy="8" r="5" fill="#10b981"/>
        <circle cx="20" cy="8" r="9" fill="#10b981" fill-opacity="0.3"/>
      </g>
    </g>
  </g>

  <!-- bottom implication strip -->
  <g transform="translate(40,500)">
    <rect x="0" y="0" width="880" height="40" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="20" y="25" font-size="12" fill="#334155"><tspan font-weight="700">Why three channels: </tspan>&#8220;tired but content&#8221; (low E, low S, high F) &#8800; &#8220;tired and depleted&#8221; (low E, high S, low F). Only a multi-channel display can show the difference.</text>
  </g>
</svg>
