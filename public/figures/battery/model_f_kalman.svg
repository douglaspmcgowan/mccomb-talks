<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="uncBand" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="960" height="480" fill="#fafafa"/>

  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Model F &#8212; Bayesian Kalman filter</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">Treat E as a latent state with process noise; every signal is a noisy observation. Posterior mean and its uncertainty both drive the display.</text>

  <!-- equation -->
  <g transform="translate(40,90)">
    <rect x="0" y="0" width="420" height="52" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="14" y="22" font-size="12" font-weight="700" fill="#334155">Predict + Update</text>
    <text x="14" y="42" font-size="12" font-family="'SF Mono',Consolas,monospace" fill="#0f172a">x &#8592; Ax; P &#8592; APA&#7488;+Q; K = PH&#7488;(HPH&#7488;+R)&#8315;&#185;; x &#8592; x+K(z-Hx)</text>
  </g>

  <!-- legend -->
  <g transform="translate(480,90)" font-size="11" fill="#475569">
    <rect x="0" y="0" width="440" height="52" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <line x1="14" y1="22" x2="42" y2="22" stroke="#64748b" stroke-width="1.8" stroke-dasharray="5,3"/>
    <text x="48" y="26" font-weight="600">true latent E(t)</text>
    <circle cx="172" cy="22" r="3.5" fill="#dc2626"/>
    <text x="184" y="26" font-weight="600">noisy observations</text>
    <rect x="300" y="15" width="22" height="14" fill="url(#uncBand)" stroke="#60a5fa" stroke-width="0.8"/>
    <text x="328" y="26" font-weight="600">posterior &#177;&sigma;</text>
    <line x1="14" y1="40" x2="42" y2="40" stroke="#2563eb" stroke-width="3"/>
    <text x="48" y="44" font-weight="600">posterior mean</text>
  </g>

  <!-- plot -->
  <g transform="translate(60,180)">
    <!-- axes -->
    <line x1="0" y1="210" x2="860" y2="210" stroke="#475569" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="0" y2="210" stroke="#475569" stroke-width="1.2"/>
    <text x="-8" y="5" text-anchor="end" font-size="10" fill="#64748b">100</text>
    <text x="-8" y="110" text-anchor="end" font-size="10" fill="#64748b">50</text>
    <text x="-8" y="215" text-anchor="end" font-size="10" fill="#64748b">0</text>
    <text x="-40" y="100" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90 -40 100)">E(t)</text>

    <!-- time labels -->
    <g font-size="10" fill="#64748b">
      <text x="0"   y="228" text-anchor="middle">9am</text>
      <text x="172" y="228" text-anchor="middle">11am</text>
      <text x="344" y="228" text-anchor="middle">1pm</text>
      <text x="516" y="228" text-anchor="middle">3pm</text>
      <text x="688" y="228" text-anchor="middle">5pm</text>
      <text x="860" y="228" text-anchor="middle">7pm</text>
    </g>

    <!-- uncertainty band (fills then mean line) -->
    <path d="M 0 80
             C 86 70, 130 72, 172 78
             C 220 84, 260 98, 300 110
             C 340 120, 400 128, 450 130
             C 500 130, 560 122, 610 108
             C 660 94, 720 86, 780 82
             L 860 80
             L 860 130
             C 780 130, 720 134, 660 148
             C 610 160, 560 172, 500 178
             C 450 180, 400 178, 344 170
             C 300 162, 260 152, 220 140
             C 180 128, 130 118, 86 108
             L 0 128 Z"
          fill="url(#uncBand)" stroke="none"/>

    <!-- true latent (dashed) -->
    <path d="M 0 100
             C 86 88, 130 90, 172 98
             C 220 108, 260 124, 300 138
             C 340 148, 400 152, 450 154
             C 500 156, 560 148, 610 130
             C 660 114, 720 108, 780 102
             L 860 102"
          fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- posterior mean (solid blue) -->
    <path d="M 0 104
             C 86 94, 130 96, 172 102
             C 220 112, 260 126, 300 140
             C 340 150, 400 154, 450 156
             C 500 156, 560 148, 610 132
             C 660 116, 720 110, 780 106
             L 860 105"
          fill="none" stroke="#2563eb" stroke-width="3.2" stroke-linecap="round"/>

    <!-- noisy observation dots (scattered around latent) -->
    <g fill="#dc2626">
      <circle cx="20"  cy="92"  r="3.5"/>
      <circle cx="55"  cy="110" r="3.5"/>
      <circle cx="90"  cy="78"  r="3.5"/>
      <circle cx="130" cy="102" r="3.5"/>
      <circle cx="172" cy="110" r="3.5"/>
      <circle cx="215" cy="94"  r="3.5"/>
      <circle cx="255" cy="135" r="3.5"/>
      <circle cx="300" cy="126" r="3.5"/>
      <circle cx="345" cy="158" r="3.5"/>
      <circle cx="390" cy="142" r="3.5"/>
      <circle cx="430" cy="165" r="3.5"/>
      <circle cx="475" cy="148" r="3.5"/>
      <circle cx="520" cy="142" r="3.5"/>
      <circle cx="565" cy="155" r="3.5"/>
      <circle cx="610" cy="120" r="3.5"/>
      <circle cx="650" cy="135" r="3.5"/>
      <circle cx="695" cy="98"  r="3.5"/>
      <circle cx="740" cy="118" r="3.5"/>
      <circle cx="780" cy="94"  r="3.5"/>
      <circle cx="820" cy="115" r="3.5"/>
    </g>

    <!-- annotations -->
    <g>
      <!-- tight band region -->
      <path d="M 150 50 Q 180 40 210 50" fill="none" stroke="#64748b" stroke-width="1" marker-end=""/>
      <text x="70"  y="45" font-size="10" fill="#64748b" font-style="italic">many signals active</text>
      <text x="70"  y="57" font-size="10" fill="#64748b" font-style="italic">&#8594; tight uncertainty band</text>

      <!-- wide band note -->
      <text x="450" y="200" font-size="10" fill="#64748b" font-style="italic">missing wearable &#8594; wider band</text>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(60,450)">
    <text x="0" y="0" font-size="11" fill="#64748b"><tspan font-weight="700" fill="#334155">Display benefit: </tspan>the battery dims its <em>certainty</em> when signals are sparse &#8212; a sharp fill when confident, a fuzzy one when the model is guessing.</text>
  </g>
</svg>
