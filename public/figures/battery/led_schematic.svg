<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2a6"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#fafafa"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#222">Psych_Battery LED Wiring Schematic</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#666">ESP32 → 74AHCT125 level shifter → WS2812B LEDs, shared 5V rail</text>

  <!-- Legend -->
  <g transform="translate(50,78)">
    <rect width="220" height="36" fill="#fff" stroke="#ccc" rx="4"/>
    <line x1="14" y1="18" x2="38" y2="18" stroke="#d62828" stroke-width="2.5"/>
    <text x="44" y="22" font-size="11" fill="#333">+5V</text>
    <line x1="80" y1="18" x2="104" y2="18" stroke="#222" stroke-width="2.5"/>
    <text x="110" y="22" font-size="11" fill="#333">GND</text>
    <line x1="150" y1="18" x2="174" y2="18" stroke="#2a6" stroke-width="2.5"/>
    <text x="180" y="22" font-size="11" fill="#333">Data</text>
  </g>

  <!-- Power rails -->
  <rect x="60" y="448" width="800" height="5" fill="#d62828"/>
  <text x="48" y="453" text-anchor="end" font-size="12" fill="#d62828" font-weight="600">+5V rail</text>
  <rect x="60" y="490" width="800" height="5" fill="#222"/>
  <text x="48" y="495" text-anchor="end" font-size="12" fill="#222" font-weight="600">GND rail</text>

  <!-- Barrel Jack -->
  <g transform="translate(80,380)">
    <rect width="90" height="90" fill="#fff" stroke="#555" stroke-width="1.5" rx="3"/>
    <text x="45" y="24" text-anchor="middle" font-size="12" font-weight="600">Barrel Jack</text>
    <text x="45" y="40" text-anchor="middle" font-size="10" fill="#666">5V 4A PSU</text>
    <circle cx="28" cy="62" r="3" fill="#d62828"/>
    <text x="28" y="80" text-anchor="middle" font-size="10" fill="#d62828">+</text>
    <circle cx="62" cy="62" r="3" fill="#222"/>
    <text x="62" y="80" text-anchor="middle" font-size="10" fill="#222">−</text>
  </g>
  <line x1="108" y1="442" x2="108" y2="448" stroke="#d62828" stroke-width="2"/>
  <line x1="142" y1="442" x2="142" y2="490" stroke="#222" stroke-width="2"/>

  <!-- ESP32 -->
  <g transform="translate(220,140)">
    <rect width="180" height="240" fill="#fff" stroke="#2a6" stroke-width="1.8" rx="4"/>
    <rect x="0" y="0" width="180" height="32" fill="#2a6" rx="4"/>
    <text x="90" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">ESP32 DevKit V1</text>
    <text x="90" y="48" text-anchor="middle" font-size="10" fill="#888">(power from USB)</text>
    <!-- GPIO 16 -->
    <circle cx="180" cy="88" r="5" fill="#2a6" stroke="#fff" stroke-width="1.5"/>
    <text x="170" y="92" text-anchor="end" font-size="12" font-weight="600" fill="#222">GPIO 16</text>
    <text x="170" y="106" text-anchor="end" font-size="9" fill="#888">data out</text>
    <!-- GND -->
    <circle cx="180" cy="150" r="5" fill="#222" stroke="#fff" stroke-width="1.5"/>
    <text x="170" y="154" text-anchor="end" font-size="12" font-weight="600" fill="#222">GND</text>
    <text x="170" y="168" text-anchor="end" font-size="9" fill="#888">common ground</text>
    <!-- USB note -->
    <text x="90" y="210" text-anchor="middle" font-size="10" fill="#666" font-style="italic">USB ←→ laptop</text>
    <rect x="60" y="220" width="60" height="14" fill="#ddd" stroke="#888"/>
    <text x="90" y="231" text-anchor="middle" font-size="9" fill="#444">USB-A to micro-B</text>
  </g>

  <!-- Resistor -->
  <g transform="translate(430,82)">
    <rect width="70" height="18" fill="#ffe2b0" stroke="#c80" stroke-width="1.5" rx="2"/>
    <text x="35" y="13" text-anchor="middle" font-size="11" font-weight="700" fill="#c80">330 Ω</text>
  </g>
  <line x1="400" y1="228" x2="430" y2="228" stroke="#2a6" stroke-width="2"/>
  <line x1="465" y1="100" x2="465" y2="228" stroke="#2a6" stroke-width="0"/>

  <!-- 74AHCT125 -->
  <g transform="translate(500,140)">
    <rect width="140" height="220" fill="#fff" stroke="#b55" stroke-width="1.8" rx="4"/>
    <rect x="0" y="0" width="140" height="32" fill="#b55" rx="4"/>
    <text x="70" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">74AHCT125</text>
    <circle cx="14" cy="44" r="4" fill="#fff" stroke="#222"/>
    <text x="70" y="48" text-anchor="middle" font-size="9" fill="#888">level shifter (DIP-14)</text>
    <!-- Left pins -->
    <circle cx="0" cy="78" r="4" fill="#222"/>
    <text x="-8" y="82" text-anchor="end" font-size="11" font-weight="600">1</text>
    <text x="8" y="82" font-size="10" fill="#555">1OE → GND</text>
    <circle cx="0" cy="108" r="4" fill="#222"/>
    <text x="-8" y="112" text-anchor="end" font-size="11" font-weight="600">2</text>
    <text x="8" y="112" font-size="10" fill="#555">1A (in)</text>
    <circle cx="0" cy="138" r="4" fill="#222"/>
    <text x="-8" y="142" text-anchor="end" font-size="11" font-weight="600">3</text>
    <text x="8" y="142" font-size="10" fill="#555">1Y (out)</text>
    <circle cx="0" cy="198" r="4" fill="#222"/>
    <text x="-8" y="202" text-anchor="end" font-size="11" font-weight="600">7</text>
    <text x="8" y="202" font-size="10" fill="#555">GND</text>
    <!-- Right pins -->
    <circle cx="140" cy="78" r="4" fill="#222"/>
    <text x="148" y="82" font-size="11" font-weight="600">14</text>
    <text x="132" y="82" text-anchor="end" font-size="10" fill="#555">VCC</text>
  </g>
  <!-- Resistor→pin2 wire -->
  <line x1="500" y1="100" x2="500" y2="248" stroke="#2a6" stroke-width="0"/>
  <line x1="500" y1="91" x2="500" y2="248" stroke="#2a6" stroke-width="2"/>
  <!-- GPIO16 → resistor -->
  <line x1="400" y1="228" x2="415" y2="228" stroke="#2a6" stroke-width="2"/>
  <line x1="415" y1="228" x2="415" y2="91" stroke="#2a6" stroke-width="2"/>
  <line x1="415" y1="91" x2="430" y2="91" stroke="#2a6" stroke-width="2"/>
  <!-- Resistor → pin 2 -->
  <line x1="500" y1="91" x2="500" y2="248" stroke="#2a6" stroke-width="2"/>
  <!-- pin 1 (1OE) → GND rail -->
  <line x1="500" y1="218" x2="480" y2="218" stroke="#222" stroke-width="1.8"/>
  <line x1="480" y1="218" x2="480" y2="490" stroke="#222" stroke-width="1.8"/>
  <!-- pin 7 → GND rail -->
  <line x1="500" y1="338" x2="490" y2="338" stroke="#222" stroke-width="1.8"/>
  <line x1="490" y1="338" x2="490" y2="490" stroke="#222" stroke-width="1.8"/>
  <!-- pin 14 → +5V rail -->
  <line x1="640" y1="218" x2="660" y2="218" stroke="#d62828" stroke-width="1.8"/>
  <line x1="660" y1="218" x2="660" y2="448" stroke="#d62828" stroke-width="1.8"/>
  <!-- ESP32 GND → rail -->
  <line x1="400" y1="290" x2="410" y2="290" stroke="#222" stroke-width="1.8"/>
  <line x1="410" y1="290" x2="410" y2="490" stroke="#222" stroke-width="1.8"/>

  <!-- LED module -->
  <g transform="translate(770,250)">
    <circle cx="0" cy="0" r="72" fill="#fff8e6" stroke="#f80" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="#ffd97a" stroke="#f80" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" font-size="12" font-weight="700" fill="#222">Ring+Jewel</text>
    <text x="0" y="12" text-anchor="middle" font-size="10" fill="#666">31 × WS2812B</text>
    <!-- pads -->
    <circle cx="-72" cy="0" r="4" fill="#2a6"/>
    <text x="-82" y="4" text-anchor="end" font-size="11" font-weight="600" fill="#2a6">DIN</text>
    <circle cx="0" cy="-72" r="4" fill="#d62828"/>
    <text x="0" y="-82" text-anchor="middle" font-size="11" font-weight="600" fill="#d62828">+5V</text>
    <circle cx="0" cy="72" r="4" fill="#222"/>
    <text x="0" y="94" text-anchor="middle" font-size="11" font-weight="600">GND</text>
  </g>
  <!-- pin3 → DIN -->
  <line x1="500" y1="278" x2="688" y2="250" stroke="#2a6" stroke-width="2" marker-end="url(#arr)"/>
  <!-- LED +5V → rail -->
  <line x1="770" y1="178" x2="770" y2="148" stroke="#d62828" stroke-width="1.8"/>
  <line x1="770" y1="148" x2="720" y2="148" stroke="#d62828" stroke-width="1.8"/>
  <line x1="720" y1="148" x2="720" y2="448" stroke="#d62828" stroke-width="1.8"/>
  <!-- LED GND → rail -->
  <line x1="770" y1="322" x2="770" y2="490" stroke="#222" stroke-width="1.8"/>

  <!-- Capacitor across rails near LED -->
  <g transform="translate(800,415)">
    <line x1="0" y1="33" x2="0" y2="22" stroke="#d62828" stroke-width="2"/>
    <line x1="-7" y1="22" x2="7" y2="22" stroke="#d62828" stroke-width="3"/>
    <line x1="-7" y1="18" x2="7" y2="18" stroke="#222" stroke-width="3"/>
    <line x1="0" y1="18" x2="0" y2="-33" stroke="#222" stroke-width="2"/>
    <text x="14" y="2" font-size="10" fill="#333">1000 µF</text>
    <text x="14" y="14" font-size="9" fill="#888">long leg → +5V</text>
  </g>

  <!-- Callouts -->
  <g transform="translate(50,520)">
    <text x="0" y="0" font-size="11" fill="#555" font-style="italic">Common ground is mandatory — all three GND pins tied together.</text>
    <text x="0" y="18" font-size="11" fill="#555" font-style="italic">330 Ω sits between the level shifter output and the LED's DIN, not at the ESP32 side.</text>
  </g>
</svg>
