<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="960" height="480" fill="#fafafa"/>

  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Model C &#8212; Allostatic load EMA (slow-moving stress)</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">Each day's stressor score feeds a multi-day exponential average. One bad day barely moves it; a bad week lifts it substantially.</text>

  <!-- equation -->
  <g transform="translate(40,90)">
    <rect x="0" y="0" width="400" height="52" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="14" y="22" font-size="12" font-weight="700" fill="#334155">Update rule (daily tick)</text>
    <text x="14" y="42" font-size="13" font-family="'SF Mono',Consolas,monospace" fill="#0f172a">AL&#8242; = &lambda; &middot; AL + (1-&lambda;) &middot; stressor_score &nbsp; &nbsp; &lambda;=0.85</text>
  </g>
  <g transform="translate(470,90)" font-size="11" fill="#475569">
    <rect x="0" y="0" width="450" height="52" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <!-- daily stressor bar -->
    <rect x="14" y="20" width="16" height="20" fill="#94a3b8"/>
    <text x="38" y="28" font-weight="600">daily stressor score</text>
    <text x="38" y="42" font-size="9">sleep debt, after-hours, fragmentation, HRV&darr;</text>
    <!-- EMA line -->
    <line x1="230" y1="30" x2="270" y2="30" stroke="#dc2626" stroke-width="3"/>
    <text x="278" y="34" font-weight="600" fill="#991b1b">allostatic load (EMA)</text>
    <text x="278" y="46" font-size="9" fill="#64748b">half-life &asymp; 4 days</text>
  </g>

  <!-- plot -->
  <g transform="translate(60,180)">
    <!-- axes -->
    <line x1="0" y1="210" x2="860" y2="210" stroke="#475569" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="0" y2="210" stroke="#475569" stroke-width="1.2"/>
    <text x="-8" y="5" text-anchor="end" font-size="10" fill="#64748b">100</text>
    <text x="-8" y="110" text-anchor="end" font-size="10" fill="#64748b">50</text>
    <text x="-8" y="215" text-anchor="end" font-size="10" fill="#64748b">0</text>
    <text x="-40" y="100" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90 -40 100)">score</text>

    <!-- threshold line -->
    <line x1="0" y1="84" x2="860" y2="84" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="854" y="80" text-anchor="end" font-size="9" fill="#64748b" font-style="italic">chronic-load threshold (60)</text>

    <!-- daily bars: 14 days, each spike_value then EMA -->
    <!-- day heights (stressor scores) -->
    <!-- 28, 34, 40, 55, 72, 88, 50, 20, 25, 60, 80, 92, 75, 45 -->
    <g fill="#94a3b8">
      <rect x="15"  y="152" width="30" height="58"/>
      <rect x="76"  y="140" width="30" height="70"/>
      <rect x="137" y="126" width="30" height="84"/>
      <rect x="198" y="96"  width="30" height="114"/>
      <rect x="259" y="60"  width="30" height="150"/>
      <rect x="320" y="27"  width="30" height="183"/>
      <rect x="381" y="105" width="30" height="105"/>
      <rect x="442" y="168" width="30" height="42"/>
      <rect x="503" y="158" width="30" height="52"/>
      <rect x="564" y="84"  width="30" height="126"/>
      <rect x="625" y="42"  width="30" height="168"/>
      <rect x="686" y="18"  width="30" height="192"/>
      <rect x="747" y="54"  width="30" height="156"/>
      <rect x="808" y="116" width="30" height="94"/>
    </g>
    <!-- day labels -->
    <g font-size="9" fill="#64748b">
      <text x="30"  y="225" text-anchor="middle">M</text>
      <text x="91"  y="225" text-anchor="middle">T</text>
      <text x="152" y="225" text-anchor="middle">W</text>
      <text x="213" y="225" text-anchor="middle">T</text>
      <text x="274" y="225" text-anchor="middle">F</text>
      <text x="335" y="225" text-anchor="middle">S</text>
      <text x="396" y="225" text-anchor="middle">S</text>
      <text x="457" y="225" text-anchor="middle">M</text>
      <text x="518" y="225" text-anchor="middle">T</text>
      <text x="579" y="225" text-anchor="middle">W</text>
      <text x="640" y="225" text-anchor="middle">T</text>
      <text x="701" y="225" text-anchor="middle">F</text>
      <text x="762" y="225" text-anchor="middle">S</text>
      <text x="823" y="225" text-anchor="middle">S</text>
    </g>
    <!-- week labels -->
    <text x="183" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">week 1</text>
    <text x="640" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">week 2</text>

    <!-- EMA curve (calculated with lambda=0.85, starting at 28) -->
    <!-- values: 28, 28.9, 30.565, 34.23, 39.9, 47.11, 47.54, 43.41, 40.65, 43.55, 49.02, 55.47, 58.4, 56.39 -->
    <!-- y = 210 - value * 2.1 -->
    <path d="M 30 151.2
             L 91 149.3
             L 152 145.8
             L 213 138.1
             L 274 126.2
             L 335 111.1
             L 396 110.2
             L 457 118.8
             L 518 124.6
             L 579 118.5
             L 640 107.0
             L 701 93.5
             L 762 87.4
             L 823 91.6"
          fill="none" stroke="#dc2626" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- annotations -->
    <g>
      <!-- ego depletion note -->
      <line x1="335" y1="27" x2="335" y2="-8" stroke="#64748b" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="335" y="-12" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">a bad Saturday alone</text>
      <text x="335" y="-24" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">barely moves EMA</text>

      <line x1="701" y1="18" x2="701" y2="-8" stroke="#b45309" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="701" y="-12" text-anchor="middle" font-size="10" fill="#b45309" font-style="italic">sustained week 2 surge</text>
      <text x="701" y="-24" text-anchor="middle" font-size="10" fill="#b45309" font-style="italic">drives EMA across threshold</text>
    </g>
  </g>

  <!-- footer note -->
  <g transform="translate(60,450)">
    <text x="0" y="0" font-size="11" fill="#64748b"><tspan font-weight="700" fill="#334155">Mechanism (McEwen, 1998): </tspan>repeated activation wears down regulatory physiology; single spikes are noise, but sustained load persists. Ideal as the <em>color layer</em> stacked on top of Model B.</text>
  </g>
</svg>
