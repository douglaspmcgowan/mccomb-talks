<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="fillE_E" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/><stop offset="1" stop-color="#fbbf24" stop-opacity="0"/></linearGradient>
    <linearGradient id="fillE_S" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#ef4444" stop-opacity="0.35"/><stop offset="1" stop-color="#ef4444" stop-opacity="0"/></linearGradient>
    <linearGradient id="fillE_F" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#10b981" stop-opacity="0.35"/><stop offset="1" stop-color="#10b981" stop-opacity="0"/></linearGradient>
  </defs>
  <rect width="960" height="520" fill="#fafafa"/>

  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Model E &#8212; Three-axis vector (E, S, F)</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">State is a 3-tuple. Each axis evolves on its own; each drives a distinct display channel. The same day can be &ldquo;tired but fulfilled&rdquo; or &ldquo;tired and depleted.&rdquo;</text>

  <!-- ========== three stacked tracks ========== -->
  <g transform="translate(80,100)">

    <!-- E track -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="640" height="100" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
      <!-- axis label -->
      <text x="-12" y="14" text-anchor="end" font-size="12" font-weight="700" fill="#b45309">E</text>
      <text x="-12" y="28" text-anchor="end" font-size="9" fill="#92400e">Energy</text>
      <!-- guide lines -->
      <line x1="0" y1="50" x2="640" y2="50" stroke="#fde68a" stroke-width="1" stroke-dasharray="3,3"/>
      <!-- curve E: high morning, dip noon-2pm, recover late -->
      <path d="M 0 85 C 80 30, 160 25, 240 40 C 320 55, 380 88, 440 92 C 500 96, 560 78, 640 60"
            fill="url(#fillE_E)" stroke="#f59e0b" stroke-width="2.8" stroke-linejoin="round"/>
      <text x="630" y="18" text-anchor="end" font-size="9" fill="#92400e" font-style="italic">circadian-prior aware</text>
    </g>

    <!-- S track -->
    <g transform="translate(0,120)">
      <rect x="0" y="0" width="640" height="100" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
      <text x="-12" y="14" text-anchor="end" font-size="12" font-weight="700" fill="#991b1b">S</text>
      <text x="-12" y="28" text-anchor="end" font-size="9" fill="#7f1d1d">Stress</text>
      <line x1="0" y1="50" x2="640" y2="50" stroke="#fecaca" stroke-width="1" stroke-dasharray="3,3"/>
      <!-- S: slow monotone climb punctuated by meetings -->
      <path d="M 0 80 C 80 76, 160 72, 240 66 C 320 55, 380 52, 440 44 C 500 38, 560 32, 640 30"
            fill="url(#fillE_S)" stroke="#dc2626" stroke-width="2.8" stroke-linejoin="round"/>
      <text x="630" y="18" text-anchor="end" font-size="9" fill="#7f1d1d" font-style="italic">slow allostatic time-constant</text>
    </g>

    <!-- F track -->
    <g transform="translate(0,240)">
      <rect x="0" y="0" width="640" height="100" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
      <text x="-12" y="14" text-anchor="end" font-size="12" font-weight="700" fill="#065f46">F</text>
      <text x="-12" y="28" text-anchor="end" font-size="9" fill="#064e3b">Fulfillment</text>
      <line x1="0" y1="50" x2="640" y2="50" stroke="#a7f3d0" stroke-width="1" stroke-dasharray="3,3"/>
      <!-- F: step-ups on task completions -->
      <path d="M 0 88
               L 130 88 L 130 72
               L 240 72 L 240 58
               L 360 58 L 360 54
               L 440 54 L 440 38
               L 560 38 L 560 28
               L 640 28"
            fill="url(#fillE_F)" stroke="#10b981" stroke-width="2.8" stroke-linejoin="round"/>
      <text x="630" y="18" text-anchor="end" font-size="9" fill="#064e3b" font-style="italic">ratchets on completions &amp; mastery</text>
      <!-- completion markers -->
      <g fill="#10b981">
        <circle cx="130" cy="72" r="4"/>
        <circle cx="240" cy="58" r="4"/>
        <circle cx="360" cy="54" r="4"/>
        <circle cx="440" cy="38" r="4"/>
        <circle cx="560" cy="28" r="4"/>
      </g>
    </g>

    <!-- shared x-axis -->
    <line x1="0" y1="340" x2="640" y2="340" stroke="#475569" stroke-width="1.2"/>
    <g font-size="10" fill="#64748b">
      <line x1="0"   y1="340" x2="0"   y2="346" stroke="#475569"/><text x="0"   y="360" text-anchor="middle">9a</text>
      <line x1="107" y1="340" x2="107" y2="346" stroke="#475569"/><text x="107" y="360" text-anchor="middle">11a</text>
      <line x1="213" y1="340" x2="213" y2="346" stroke="#475569"/><text x="213" y="360" text-anchor="middle">1p</text>
      <line x1="320" y1="340" x2="320" y2="346" stroke="#475569"/><text x="320" y="360" text-anchor="middle">3p</text>
      <line x1="427" y1="340" x2="427" y2="346" stroke="#475569"/><text x="427" y="360" text-anchor="middle">5p</text>
      <line x1="533" y1="340" x2="533" y2="346" stroke="#475569"/><text x="533" y="360" text-anchor="middle">7p</text>
      <line x1="640" y1="340" x2="640" y2="346" stroke="#475569"/><text x="640" y="360" text-anchor="middle">9p</text>
    </g>
  </g>

  <!-- ========== display decode panel ========== -->
  <g transform="translate(760,100)">
    <text x="65" y="-6" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">display decode</text>
    <!-- battery shell -->
    <rect x="0" y="10" width="130" height="240" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
    <rect x="45" y="0" width="40" height="10" rx="2" fill="#334155"/>
    <!-- fill (E) -->
    <rect x="10" y="120" width="110" height="120" rx="4" fill="#f59e0b"/>
    <!-- hue-pulse (S) overlay (semi-transparent red wash towards top of fill) -->
    <rect x="10" y="120" width="110" height="45" rx="4" fill="#dc2626" fill-opacity="0.35"/>
    <!-- accent LED (F) -->
    <circle cx="65" cy="40" r="8" fill="#10b981"/>
    <circle cx="65" cy="40" r="15" fill="#10b981" fill-opacity="0.3"/>
    <!-- pulse ring (S) -->
    <circle cx="65" cy="160" r="60" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.55"/>

    <!-- legend -->
    <g transform="translate(-5,270)" font-size="10">
      <text x="0" y="0" font-weight="700" fill="#b45309">E &#8594; fill level</text>
      <text x="0" y="18" font-weight="700" fill="#991b1b">S &#8594; hue + pulse</text>
      <text x="0" y="36" font-weight="700" fill="#065f46">F &#8594; accent glow</text>
    </g>
  </g>

  <!-- ========== footer: two decoding callouts ========== -->
  <g transform="translate(60,470)">
    <rect x="0" y="0" width="420" height="36" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="14" y="16" font-size="11" fill="#334155"><tspan font-weight="700">Friday afternoon: </tspan>low E, low S, high F</text>
    <text x="14" y="30" font-size="11" fill="#65a30d">&#8594; dim amber, calm pulse, glowing accent &#8212; &ldquo;tired but content.&rdquo;</text>
  </g>
  <g transform="translate(500,470)">
    <rect x="0" y="0" width="420" height="36" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="14" y="16" font-size="11" fill="#334155"><tspan font-weight="700">Bad Thursday: </tspan>low E, high S, low F</text>
    <text x="14" y="30" font-size="11" fill="#b91c1c">&#8594; dim red, fast pulse, dark accent &#8212; &ldquo;tired and depleted.&rdquo;</text>
  </g>
</svg>
